<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Electric vs Gasoline Car Cost Estimator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f4f4;
      color: #222;
    }
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      margin-bottom: 0.25rem;
    }
    .content {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      align-items: start;
    }
    .panel {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 5px 18px rgba(0,0,0,0.06);
    }
    .panel h2 {
      margin-top: 0;
      font-size: 1.1rem;
    }
    .slider-row {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }
    .slider-row label {
      font-size: 0.95rem;
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    input[type=range] {
      width: 100%;
    }
    .values {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .value-box {
      background: #f0f6ff;
      border-radius: 8px;
      border: 1px solid #d0dcf5;
      padding: 10px 14px;
      flex: 1 1 140px;
      min-width: 140px;
      font-size: 0.95rem;
    }
    .chart-container {
      position: relative;
      width: 100%;
      height: 420px;
      margin-bottom: 18px;
    }
    canvas {
      width: 100% !important;
      height: 100% !important;
    }
    .note {
      margin-top: 14px;
      font-size: 0.95rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Electric vs Gasoline Car Cost Estimator</h1>
    <p>Compare yearly operating costs for an electric car and a combustion car based on consumption, energy prices, fixed costs, and annual distance.</p>

    <div class="content">
      <div class="panel">
        <div class="chart-container">
          <canvas id="costChart"></canvas>
        </div>
        <div class="slider-section">
          <h2>Electric Car</h2>
          <div class="slider-row">
            <label for="electricConsumption">Consumption (kWh / 100 km) <span id="labelElectricConsumption">20</span></label>
            <input id="electricConsumption" type="range" min="10" max="30" step="0.5" value="20" />
          </div>
          <div class="slider-row">
            <label for="electricPrice">Electricity price (ct / kWh) <span id="labelElectricPrice">30</span></label>
            <input id="electricPrice" type="range" min="0" max="100" step="1" value="30" />
          </div>
          <div class="slider-row">
            <label for="electricFixed">Fixed costs (€ / year) <span id="labelElectricFixed">500</span></label>
            <input id="electricFixed" type="range" min="0" max="2000" step="10" value="500" />
          </div>

          <h2>Gasoline Car</h2>
          <div class="slider-row">
            <label for="gasolineConsumption">Consumption (l / 100 km) <span id="labelGasolineConsumption">6</span></label>
            <input id="gasolineConsumption" type="range" min="3" max="15" step="0.5" value="6" />
          </div>
          <div class="slider-row">
            <label for="gasolinePrice">Gasoline price (€ / l) <span id="labelGasolinePrice">1.50</span></label>
            <input id="gasolinePrice" type="range" min="1" max="3" step="0.05" value="1.5" />
          </div>
          <div class="slider-row">
            <label for="gasolineFixed">Fixed costs (€ / year) <span id="labelGasolineFixed">500</span></label>
            <input id="gasolineFixed" type="range" min="0" max="2000" step="10" value="500" />
          </div>
        </div>
        <div class="note">Distance range: 0 to 30,000 km.</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="car_cost_estimator.js"></script>
</body>
</html>
